<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="760" viewBox="0 0 1120 760">
  <rect width="1120" height="760" fill="#ffffff"/>
  <style>
    text { font-family: Arial, Helvetica, DejaVu Sans, sans-serif; fill: #231533; }
    .title { font-size: 34px; font-weight: 700; }
    .subtitle { font-size: 16px; fill: #665A75; }
    .section { font-size: 18px; font-weight: 700; }
    .name { font-size: 15px; font-weight: 700; }
    .hex { font-size: 14px; fill: #665A75; }
    .role { font-size: 12px; fill: #665A75; }
  </style>

  <text x="48" y="60" class="title">Official Palette</text>
  <text x="48" y="90" class="subtitle">Sungsoo Ahn website, blog figures, and shared materials</text>

  <text x="48" y="138" class="section">Core Brand</text>
  <g transform="translate(48 162)">
    <rect x="0" y="0" width="150" height="88" rx="10" fill="#7A53EC"/>
    <text x="0" y="120" class="name">Purple</text>
    <text x="0" y="144" class="hex">#7A53EC</text>

    <rect x="178" y="0" width="150" height="88" rx="10" fill="#5B3A8C"/>
    <text x="178" y="120" class="name">Purple Strong</text>
    <text x="178" y="144" class="hex">#5B3A8C</text>

    <rect x="356" y="0" width="150" height="88" rx="10" fill="#231533"/>
    <text x="356" y="120" class="name">Ink</text>
    <text x="356" y="144" class="hex">#231533</text>

    <rect x="534" y="0" width="150" height="88" rx="10" fill="#665A75"/>
    <text x="534" y="120" class="name">Muted</text>
    <text x="534" y="144" class="hex">#665A75</text>

    <rect x="712" y="0" width="150" height="88" rx="10" fill="#F6F2FA" stroke="#C8BBD8"/>
    <text x="712" y="120" class="name">Purple Soft</text>
    <text x="712" y="144" class="hex">#F6F2FA</text>

    <rect x="890" y="0" width="150" height="88" rx="10" fill="#F2EDFF" stroke="#C8BBD8"/>
    <text x="890" y="120" class="name">Purple Light</text>
    <text x="890" y="144" class="hex">#F2EDFF</text>
  </g>

  <text x="48" y="374" class="section">Semantic Figure Accents</text>
  <g transform="translate(48 398)">
    <rect x="0" y="0" width="150" height="88" rx="10" fill="#5F6ED8"/>
    <rect x="0" y="100" width="150" height="34" rx="8" fill="#EEF0FF" stroke="#5F6ED8"/>
    <text x="0" y="162" class="name">Indigo</text>
    <text x="0" y="186" class="hex">#5F6ED8 / #EEF0FF</text>
    <text x="0" y="208" class="role">Secondary components</text>

    <rect x="178" y="0" width="150" height="88" rx="10" fill="#16877F"/>
    <rect x="178" y="100" width="150" height="34" rx="8" fill="#E4F4F2" stroke="#16877F"/>
    <text x="178" y="162" class="name">Teal</text>
    <text x="178" y="186" class="hex">#16877F / #E4F4F2</text>
    <text x="178" y="208" class="role">Cool processes</text>

    <rect x="356" y="0" width="150" height="88" rx="10" fill="#B7791F"/>
    <rect x="356" y="100" width="150" height="34" rx="8" fill="#FFF4DC" stroke="#B7791F"/>
    <text x="356" y="162" class="name">Amber</text>
    <text x="356" y="186" class="hex">#B7791F / #FFF4DC</text>
    <text x="356" y="208" class="role">Energy, work, bias</text>

    <rect x="534" y="0" width="150" height="88" rx="10" fill="#C7506B"/>
    <rect x="534" y="100" width="150" height="34" rx="8" fill="#FCE8EE" stroke="#C7506B"/>
    <text x="534" y="162" class="name">Rose</text>
    <text x="534" y="186" class="hex">#C7506B / #FCE8EE</text>
    <text x="534" y="208" class="role">Negative, barriers</text>

    <rect x="712" y="0" width="150" height="88" rx="10" fill="#3C8F63"/>
    <rect x="712" y="100" width="150" height="34" rx="8" fill="#E5F3EA" stroke="#3C8F63"/>
    <text x="712" y="162" class="name">Green</text>
    <text x="712" y="186" class="hex">#3C8F63 / #E5F3EA</text>
    <text x="712" y="208" class="role">Positive, favorable</text>

    <rect x="890" y="0" width="150" height="88" rx="10" fill="#B9AEC7"/>
    <rect x="890" y="100" width="150" height="34" rx="8" fill="#E4DDEC" stroke="#C8BBD8"/>
    <text x="890" y="162" class="name">Neutral</text>
    <text x="890" y="186" class="hex">#B9AEC7 / #E4DDEC</text>
    <text x="890" y="208" class="role">Auxiliary marks</text>
  </g>

  <text x="48" y="672" class="section">Default Rule</text>
  <text x="48" y="702" class="subtitle">Use purple as the visual anchor. Use teal, amber, rose, green, and indigo only when they encode meaning or separate multiple objects.</text>
</svg>
