<svg xmlns="http://www.w3.org/2000/svg" width="820" height="330" viewBox="0 0 820 330"><rect width="100%" height="100%" fill="white"/><defs><marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#87949a"/></marker><marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#4f7ea8"/></marker><marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#d99a24"/></marker><marker id="arrow-teal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#158574"/></marker><marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#c85b4a"/></marker><marker id="arrow-text" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#263238"/></marker></defs><style>text{font-family:Arial,Helvetica,'DejaVu Sans',sans-serif;dominant-baseline:middle}.caption{fill:#6f7f86;font-size:15px;font-weight:500}</style><text text-anchor="middle" font-size="22" font-weight="700" fill="#263238"><tspan x="410.0" y="34.0">Detailed balance is a local edge condition</tspan></text><rect x="90.0" y="100.0" width="170.0" height="92.0" rx="8.0" fill="#e6eef6" stroke="#4f7ea8" stroke-width="2.2"/><text text-anchor="middle" font-size="20" font-weight="700" fill="#4f7ea8"><tspan x="175.0" y="128.0">state s</tspan></text><text text-anchor="middle" font-size="18" font-weight="700" fill="#263238"><tspan x="175.0" y="162.0">F(s) = 5</tspan></text><rect x="560.0" y="100.0" width="170.0" height="92.0" rx="8.0" fill="#fae8e4" stroke="#c85b4a" stroke-width="2.2"/><text text-anchor="middle" font-size="20" font-weight="700" fill="#c85b4a"><tspan x="645.0" y="128.0">state s&#x27;</tspan></text><text text-anchor="middle" font-size="18" font-weight="700" fill="#263238"><tspan x="645.0" y="162.0">F(s&#x27;) = 2</tspan></text><path d="M 270 122 C 370 82, 455 82, 550 122" fill="none" stroke="#4f7ea8" stroke-width="4.0" stroke-linecap="round" opacity="1.00" marker-end="url(#arrow-blue)"/><path d="M 550 170 C 455 212, 370 212, 270 170" fill="none" stroke="#d99a24" stroke-width="4.0" stroke-linecap="round" opacity="1.00" marker-end="url(#arrow-amber)"/><rect x="320.0" y="78.0" width="180.0" height="30.0" rx="4.0" fill="#ffffff" stroke="none" stroke-width="0.0"/><text text-anchor="middle" font-size="16" font-weight="700" fill="#4f7ea8"><tspan x="410.0" y="92.0">pF(s&#x27;|s) = 2/5</tspan></text><rect x="342.0" y="200.0" width="136.0" height="30.0" rx="4.0" fill="#ffffff" stroke="none" stroke-width="0.0"/><text text-anchor="middle" font-size="16" font-weight="700" fill="#d99a24"><tspan x="410.0" y="214.0">pB(s|s&#x27;) = 1</tspan></text><rect x="150.0" y="248.0" width="520.0" height="44.0" rx="6.0" fill="#ffffff" stroke="#d8e0e4" stroke-width="1.2"/><text text-anchor="middle" font-size="18" font-weight="700" fill="#263238"><tspan x="410.0" y="270.0">local condition:  F(s) * pF(s&#x27;|s) = F(s&#x27;) * pB(s|s&#x27;)</tspan></text></svg>
